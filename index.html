<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diet Improviser</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green:      #2d6a4f;
      --green-light:#52b788;
      --cream:      #fdf8f0;
      --tan:        #e9ddc8;
      --charcoal:   #1a1a1a;
      --mid:        #5c5c5c;
      --card-bg:    #ffffff;
      --border:     #e0d8cc;
      --accent:     #d4a843;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: var(--green);
      padding: 48px 24px 64px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -200px; right: -100px;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      bottom: -120px; left: -60px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #fff;
      letter-spacing: -0.5px;
      position: relative; z-index: 1;
    }
    .hero p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      margin-top: 8px;
      font-weight: 300;
      position: relative; z-index: 1;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 900px;
      margin: -32px auto 60px;
      padding: 0 20px;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.09);
      border: 1px solid var(--border);
    }
    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--green);
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--charcoal);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
    }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #245840; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    /* ── LOADER ── */
    #loader {
      display: none;
      text-align: center;
      padding: 40px 0;
      color: var(--mid);
      font-size: 0.9rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--tan);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULT ── */
    #result { margin-top: 32px; }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 14px;
      text-align: center;
    }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--green);
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-top: 4px;
    }

    /* ── MEAL SECTIONS ── */
    .meals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 24px;
    }
    .meal-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .meal-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .meal-header .icon { font-size: 1.4rem; }
    .meal-header .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
    }
    .meal-header .time {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--mid);
      font-weight: 300;
    }

    /* Meal color coding */
    .meal-breakfast .meal-header { background: #fef9ee; border-bottom: 1px solid #f5e4b5; }
    .meal-breakfast .title { color: #a0660a; }
    .meal-lunch .meal-header { background: #f0faf4; border-bottom: 1px solid #b8e8cc; }
    .meal-lunch .title { color: var(--green); }
    .meal-evening .meal-header { background: #fdf3ee; border-bottom: 1px solid #f5cdb0; }
    .meal-evening .title { color: #b5490f; }
    .meal-dinner .meal-header { background: #f0f2fc; border-bottom: 1px solid #c5caed; }
    .meal-dinner .title { color: #3040a0; }

    .meal-items { padding: 14px 18px; }
    .food-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--tan);
      font-size: 0.88rem;
    }
    .food-row:last-child { border-bottom: none; }
    .food-name { font-weight: 500; }
    .food-meta { color: var(--mid); font-size: 0.78rem; text-align: right; }
    .food-meta span { display: block; }

    /* ── SUGGESTIONS ── */
    .suggestions-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
    }
    .suggestions-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--charcoal);
      margin-bottom: 14px;
    }
    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      font-size: 0.88rem;
      color: var(--mid);
      border-bottom: 1px solid var(--tan);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item::before {
      content: '→';
      color: var(--green-light);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── PLAN TITLE ── */
    .plan-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .plan-title span { color: var(--green); }

    /* ── PROGRESS BAR ── */
    .progress-wrap { margin: 6px 0 2px; }
    .progress-label { font-size: 0.72rem; color: var(--mid); display: flex; justify-content: space-between; margin-bottom: 4px; }
    .progress-bar { height: 6px; background: var(--tan); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green-light); border-radius: 99px; transition: width 1s ease; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .summary-bar { grid-template-columns: 1fr 1fr; }
      .meals-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>🥗 Diet Improviser</h1>
    <p>Personalised nutrition plans built around your goals and budget</p>
  </div>

  <div class="container">

    <!-- FORM -->
    <div class="form-card">
      <h2>Tell us about yourself</h2>
      <div class="form-grid">
        <div>
          <label>Name</label>
          <input type="text" id="name" placeholder="e.g. Arjun">
        </div>
        <div>
          <label>Age</label>
          <input type="number" id="age" placeholder="e.g. 22">
        </div>
        <div>
          <label>Weight (kg)</label>
          <input type="number" id="weight" placeholder="e.g. 70">
        </div>
        <div>
          <label>Height (cm)</label>
          <input type="number" id="height" placeholder="e.g. 175">
        </div>
        <div>
          <label>Goal</label>
          <select id="goal">
            <option>Muscle Gain</option>
            <option>Fat Loss</option>
          </select>
        </div>
        <div>
          <label>Diet Type</label>
          <select id="diet">
            <option>Veg</option>
            <option>Non-Veg</option>
          </select>
        </div>
        <div>
          <label>Daily Budget (₹)</label>
          <input type="number" id="budget" placeholder="e.g. 200">
        </div>
        <div>
          <label>Maintenance Calories</label>
          <input type="number" id="calories" placeholder="e.g. 2000">
        </div>
      </div>
      <button class="btn" onclick="submitUser()" id="submitBtn">Generate My Diet Plan</button>
    </div>

    <!-- LOADER -->
    <div id="loader">
      <div class="spinner"></div>
      Building your plan…
    </div>

    <!-- RESULT -->
    <div id="result"></div>

  </div>

  <script>
    // ── meal splitter ──────────────────────────────────────────────
    function splitIntoMeals(foods) {
      const total = foods.length;
      const meals = { breakfast: [], lunch: [], evening: [], dinner: [] };

      if (total === 0) return meals;

      // Assign by index quartile
      foods.forEach((f, i) => {
        const ratio = i / total;
        if (ratio < 0.25)       meals.breakfast.push(f);
        else if (ratio < 0.55)  meals.lunch.push(f);
        else if (ratio < 0.75)  meals.evening.push(f);
        else                    meals.dinner.push(f);
      });

      return meals;
    }

    // ── submit ─────────────────────────────────────────────────────
    async function submitUser() {
      const btn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');
      const resultEl = document.getElementById('result');

      const user = {
        name:                 document.getElementById("name").value.trim(),
        age:                  document.getElementById("age").value,
        weight:               document.getElementById("weight").value,
        height:               document.getElementById("height").value,
        goal:                 document.getElementById("goal").value,
        diet_type:            document.getElementById("diet").value,
        budget:               document.getElementById("budget").value,
        maintenance_calories: document.getElementById("calories").value
      };

      if (!user.name || !user.weight || !user.budget) {
        alert("Please fill in Name, Weight and Budget at minimum.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Generating…";
      loader.style.display = "block";
      resultEl.innerHTML = "";

      try {
        // Add user
        await fetch("http://localhost:3000/addUser", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
        });

        // Get latest user
        let res = await fetch("http://localhost:3000/users");
        let users = await res.json();
        let lastUser = users[users.length - 1];

        // Generate diet
        let dietRes = await fetch(`http://localhost:3000/generateDiet/${lastUser.user_id}`);
        let data = await dietRes.json();

        displayResult(data);
      } catch (e) {
        resultEl.innerHTML = `<p style="color:red;text-align:center;">⚠️ Could not connect to server. Make sure server.js is running.</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate My Diet Plan";
        loader.style.display = "none";
      }
    }

    // ── display ────────────────────────────────────────────────────
    function displayResult(data) {
      const calPct   = Math.min(100, Math.round((data.totalCalories / data.targetCalories) * 100));
      const protPct  = Math.min(100, Math.round((data.totalProtein  / data.requiredProtein) * 100));
      const meals    = splitIntoMeals(data.diet);

      const mealConfig = [
        { key: 'breakfast', label: 'Breakfast', icon: '🌅', time: '7 – 9 AM',   cls: 'meal-breakfast' },
        { key: 'lunch',     label: 'Lunch',     icon: '☀️', time: '12 – 2 PM',  cls: 'meal-lunch'     },
        { key: 'evening',   label: 'Evening',   icon: '🌤', time: '5 – 6 PM',   cls: 'meal-evening'   },
        { key: 'dinner',    label: 'Dinner',    icon: '🌙', time: '8 – 9 PM',   cls: 'meal-dinner'    }
      ];

      const mealCardsHTML = mealConfig.map(m => {
        const items = meals[m.key];
        if (items.length === 0) return '';

        const rows = items.map(f => `
          <div class="food-row">
            <span class="food-name">${f.name}</span>
            <span class="food-meta">
              <span>${f.protein}g protein</span>
              <span>${f.calories} kcal · ₹${f.cost}</span>
            </span>
          </div>
        `).join('');

        return `
          <div class="meal-card ${m.cls}">
            <div class="meal-header">
              <span class="icon">${m.icon}</span>
              <span class="title">${m.label}</span>
              <span class="time">${m.time}</span>
            </div>
            <div class="meal-items">${rows}</div>
          </div>
        `;
      }).join('');

      const suggestionsHTML = data.suggestions.map(s => `
        <div class="suggestion-item">${s}</div>
      `).join('');

      const html = `
        <p class="plan-title"><span>${data.user}</span>'s Personalised Plan &nbsp;·&nbsp; ${data.goal}</p>

        <div class="summary-bar">
          <div class="stat">
            <div class="stat-val">${data.totalCalories}</div>
            <div class="stat-label">Calories</div>
            <div class="progress-wrap">
              <div class="progress-label"><span></span><span>${calPct}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${calPct}%"></div></div>
            </div>
          </div>
          <div class="stat">
            <div class="stat-val">${data.totalProtein}g</div>
            <div class="stat-label">Protein</div>
            <div class="progress-wrap">
              <div class="progress-label"><span></span><span>${protPct}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${protPct}%"></div></div>
            </div>
          </div>
          <div class="stat">
            <div class="stat-val">₹${data.totalCost}</div>
            <div class="stat-label">Daily Cost</div>
          </div>
          <div class="stat">
            <div class="stat-val">${data.diet.length}</div>
            <div class="stat-label">Food Items</div>
          </div>
        </div>

        <div class="meals-grid">${mealCardsHTML}</div>

        <div class="suggestions-card">
          <h3>💡 Recommendations</h3>
          ${suggestionsHTML}
        </div>
      `;

      document.getElementById('result').innerHTML = html;
      window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
    }
  </script>

</body>
</html>
